<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Encuesta de Ubicación PRO</title>

<style>
body { font-family: Arial; background:#111; color:#eee; display:flex; justify-content:center; align-items:center; height:100vh; }
.card { background:#1c1c1c; padding:20px; border-radius:12px; width:320px; }
input, button { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:none; }
button { background:#6c63ff; color:white; cursor:pointer; }
.status { font-size:12px; margin-top:10px; }
</style>
</head>

<body>

<div class="card">
  <h3>📍 Ubicación</h3>

  <input id="nombre" placeholder="Nombre">
  <input id="email" placeholder="Correo">

  <button onclick="getLocation()">Capturar ubicación</button>

  <div class="status" id="status">Esperando ubicación...</div>

  <button onclick="submitForm()" id="sendBtn" disabled>Enviar</button>
</div>

<script>
// ================= CONFIG =================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3gQIeSuCTPzVR2ZEN5kt3KMt2AmRiX5I49vZTlMUSQSDUVeAivWckPngkBy5OjpPb0g/exec";

// ================= VARIABLES =================
let lat=null, lng=null, accuracy=null;
const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

// ================= VALIDACIÓN =================
function validEmail(e){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

// ================= GEO =================
function getLocation(){
  const status = document.getElementById("status");
  status.innerText = "Obteniendo ubicación...";

  if(!navigator.geolocation){
    return fallbackIP("Sin soporte GPS");
  }

  const success = (pos)=>{
    lat = pos.coords.latitude.toFixed(6);
    lng = pos.coords.longitude.toFixed(6);
    accuracy = Math.round(pos.coords.accuracy);

    status.innerText = `GPS OK (${lat}, ${lng})`;
    checkReady();
  };

  const error = ()=>{
    navigator.geolocation.getCurrentPosition(
      success,
      ()=> fallbackIP("GPS falló"),
      { enableHighAccuracy:false, timeout:20000, maximumAge:60000 }
    );
  };

  navigator.geolocation.getCurrentPosition(
    success,
    error,
    isIOS
      ? { enableHighAccuracy:false, timeout:20000, maximumAge:60000 }
      : { enableHighAccuracy:true, timeout:12000, maximumAge:0 }
  );
}

// ================= FALLBACK =================
async function fallbackIP(msg){
  const status = document.getElementById("status");

  try{
    status.innerText = "Usando ubicación aproximada...";

    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();

    lat = data.latitude;
    lng = data.longitude;
    accuracy = 5000;

    status.innerText = `IP OK (${lat}, ${lng})`;
    checkReady();

  }catch{
    status.innerText = msg || "Error ubicación";
  }
}

// ================= CHECK =================
function checkReady(){
  const nombre = document.getElementById("nombre").value.trim();
  const email  = document.getElementById("email").value.trim();

  const ready = nombre.length>2 && validEmail(email) && lat;

  document.getElementById("sendBtn").disabled = !ready;
}

// ================= SUBMIT =================
async function submitForm(){
  const nombre = document.getElementById("nombre").value.trim();
  const email  = document.getElementById("email").value.trim();

  const payload = {
    nombre,
    email,
    lat,
    lng,
    accuracy,
    timestamp: new Date().toISOString()
  };

  try{
    await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    alert("Enviado correctamente");

  }catch{
    alert("Error al enviar");
  }
}

// ================= AUTO CHECK =================
document.getElementById("nombre").addEventListener("input", checkReady);
document.getElementById("email").addEventListener("input", checkReady);

</script>

</body>
</html>
